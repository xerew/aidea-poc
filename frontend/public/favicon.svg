<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b3dff"/>
      <stop offset="100%" stop-color="#5a0fd6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Graduation cap: mortarboard diamond top -->
  <polygon points="16,5 27,11 16,17 5,11" fill="white"/>

  <!-- Graduation cap: cylindrical body -->
  <path d="M11,11 L11,17 Q11,19 13,19.5 L16,20.5 L19,19.5 Q21,19 21,17 L21,11" fill="rgba(255,255,255,0.82)"/>

  <!-- Tassel cord: from right point down -->
  <line x1="27" y1="11" x2="27" y2="17" stroke="white" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Tassel end bob -->
  <circle cx="27" cy="18.5" r="1.6" fill="white"/>

  <!-- AI neural nodes row at bottom -->
  <circle cx="8"  cy="26" r="1.8" fill="rgba(255,255,255,0.95)"/>
  <circle cx="16" cy="26" r="1.8" fill="#47bfff"/>
  <circle cx="24" cy="26" r="1.8" fill="rgba(255,255,255,0.95)"/>

  <!-- Connections between nodes -->
  <line x1="9.8"  y1="26" x2="14.2" y2="26" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
  <line x1="17.8" y1="26" x2="22.2" y2="26" stroke="rgba(255,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>

  <!-- Vertical connections: nodes up to cap base -->
  <line x1="8"  y1="24.2" x2="8"  y2="21" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="24.2" x2="16" y2="21" stroke="rgba(71,191,255,0.5)"   stroke-width="1" stroke-linecap="round"/>
  <line x1="24" y1="24.2" x2="24" y2="21" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-linecap="round"/>
</svg>
