# docker-compose.yml
services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: aidea
      POSTGRES_USER: aidea
      POSTGRES_PASSWORD: aidea
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidea"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama-tunnel:
    build: ./docker/ollama-tunnel
    environment:
      SSH_REMOTE_USER: ${SSH_REMOTE_USER:-ngrammatikos}
      SSH_REMOTE_HOST: ${SSH_REMOTE_HOST:-147.102.17.66}
    volumes:
      - ./docker/ollama-tunnel/keys:/keys:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aidea:aidea@db:5432/aidea
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
      OLLAMA_URL: http://ollama-tunnel:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3-translator}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama-tunnel:
        condition: service_started
    command: >
      sh -c "uv run python manage.py migrate &&
             uv run python manage.py runserver 0.0.0.0:8000"

  celery:
    build:
      context: ./backend
      target: dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aidea:aidea@db:5432/aidea
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
      OLLAMA_URL: http://ollama-tunnel:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-gemma3-translator}
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
      ollama-tunnel:
        condition: service_started
    command: uv run celery -A aidea worker -l info

  celery-beat:
    build:
      context: ./backend
      target: dev
    env_file: .env
    environment:
      DATABASE_URL: postgresql://aidea:aidea@db:5432/aidea
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
    volumes:
      - ./backend:/app
      - backend_venv:/app/.venv
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    command: uv run celery -A aidea beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler

  frontend:
    build:
      context: ./frontend
      target: dev
    env_file: .env
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  redis_data:
  backend_venv:
